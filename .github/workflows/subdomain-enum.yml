name: Subdomain Brute Force

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target domain (e.g., example.com)'
        required: true
      wordlist:
        description: 'Wordlist'
        required: true
        default: 'best-dns-wordlist'
        type: choice
        options:
          - best-dns-wordlist
          - 2m-subdomains

jobs:
  enumerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wordlist
        run: |
          if [ "${{ github.event.inputs.wordlist }}" = "best-dns-wordlist" ]; then
            URL="https://wordlists-cdn.assetnote.io/data/manual/best-dns-wordlist.txt"
          else
            URL="https://wordlists-cdn.assetnote.io/data/manual/2m-subdomains.txt"
          fi
          echo "Downloading: $URL"
          wget -O wordlist.txt "$URL"
          echo "Lines: $(wc -l < wordlist.txt)"

      - name: Install ffuf
        run: |
          wget -q https://github.com/ffuf/ffuf/releases/latest/download/ffuf_linux_amd64.tar.gz
          tar -xzf ffuf_linux_amd64.tar.gz
          chmod +x ffuf
          sudo mv ffuf /usr/local/bin/

      - name: Run ffuf subdomain scan
        run: |
          TARGET="${{ github.event.inputs.target }}"
          ffuf -w wordlist.txt -u "https://FUZZ.$TARGET" \
            -mc all -ac -se -t 50 -s 2>/dev/null | sed 's|https://||' > results.txt

      - name: Show summary
        run: |
          if [ -f results.txt ] && [ -s results.txt ]; then
            echo "=== Found $(wc -l < results.txt) subdomains ==="
            head -20 results.txt
          else
            echo "No subdomains found"
          fi

      - name: Save results to repo
        run: |
          TARGET="${{ github.event.inputs.target }}"
          SAFE_NAME=$(echo "$TARGET" | sed 's/[^a-zA-Z0-9.-]/_/g')
          mkdir -p results
          touch results.txt
          cp results.txt "results/${SAFE_NAME}.txt"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "results/${SAFE_NAME}.txt"
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Results for $TARGET using ${{ github.event.inputs.wordlist }}"
          git push
